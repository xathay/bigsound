<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 24 24" width="24" height="24" version="1.1">
  <title>BigSound</title>
  <defs>

    
    <linearGradient id="bgGrad" x1=".05" x2="1" y1="0" y2="1" gradientTransform="matrix(22,0,0,22,-56.75,-22.125)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1c6e"></stop>
      <stop offset="0.42" stop-color="#1a4fc4"></stop>
      <stop offset="1" stop-color="#1e8ce0"></stop>
    </linearGradient>

    
    <linearGradient id="hlGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"></stop>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"></stop>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>

    
    <radialGradient id="aura" cx="14" cy="12" r="9" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#62d0ff" stop-opacity="0.22"></stop>
      <stop offset="0.5" stop-color="#3b9fd8" stop-opacity="0.10"></stop>
      <stop offset="1" stop-color="#1a4fc4" stop-opacity="0"></stop>
    </radialGradient>

    
    <linearGradient id="spkFront" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"></stop>
      <stop offset="1" stop-color="#c8e8ff" stop-opacity="1"></stop>
    </linearGradient>

    
    <linearGradient id="coneSide" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"></stop>
      <stop offset="1" stop-color="#a8d0f0" stop-opacity="0.85"></stop>
    </linearGradient>

    
    <linearGradient id="waveGrad" x1="10" y1="0" x2="20" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"></stop>
      <stop offset="1" stop-color="#7dd3fc"></stop>
    </linearGradient>

    
    <clipPath id="clip">
      <rect x="1" y="1" width="22" height="22" rx="6.6"></rect>
    </clipPath>

  </defs>

  
  <rect x="1" y="1" width="22" height="22" rx="6.6" fill="url(#bgGrad)" opacity=".95" stroke="#808080" stroke-opacity=".2" vector-effect="non-scaling-stroke"></rect>

  
  <rect x="1" y="1" width="22" height="22" rx="6.6" fill="url(#aura)" clip-path="url(#clip)"></rect>

  
  <rect x="1" y="1" width="22" height="22" rx="6.6" fill="url(#hlGrad)" clip-path="url(#clip)"></rect>

  

  
  <rect x="2.6" y="7.8" width="3.4" height="8.6" rx="0.85" fill="#000000" opacity="0.18" transform="translate(0.3,0.35)"></rect>

  
  <rect x="2.2" y="7.5" width="3.4" height="9" rx="0.9" fill="url(#spkFront)"></rect>

  
  <circle cx="3.9" cy="12" r="1.15" fill="none" stroke="#a0c8e8" stroke-width="0.45" opacity="0.7"></circle>
  <circle cx="3.9" cy="12" r="0.45" fill="#b8d8f0" opacity="0.8"></circle>

  
  <path d="M 5.6 7.8 L 5.6 16.2 L 10.8 19.6 L 10.8 4.4 Z" fill="url(#coneSide)"></path>

  
  <path d="M 5.6 7.8 L 5.6 16.2 L 10.8 19.6 L 10.8 4.4 Z" fill="none" stroke="#5590cc" stroke-width="0.3" opacity="0.5"></path>

  
  <path d="M 6.2 8.8 L 10.2 5.8" stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.45"></path>

  

  
  <path d="M 12.3 7.8 A 4.2 4.2 0 0 1 12.3 16.2" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round"></path>

  
  <path d="M 12.3 8.6 A 3.4 3.4 0 0 1 12.3 15.4" fill="none" stroke="white" stroke-width="0.4" stroke-linecap="round" opacity="0.5"></path>

  
  <path d="M 14.6 5.4 A 6.7 6.7 0 0 1 14.6 18.6" fill="none" stroke="url(#waveGrad)" stroke-width="1.25" stroke-linecap="round" opacity="0.82"></path>

  
  <path d="M 17.0 3.0 A 9.1 9.1 0 0 1 17.0 21.0" fill="none" stroke="#7dd3fc" stroke-width="0.9" stroke-linecap="round" opacity="0.45"></path>

  
  <path d="M 1 7.5 Q 7.5 1 14 1 L 23 1 L 23 4.5 Q 15 4.5 7 10 Z" fill="white" opacity="0.055" clip-path="url(#clip)"></path>

</svg>